version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - BLENDER_PATH=/blender/blender
      - BLEND_FILE=/workspace/param.blend
      - ALLOWED_ORIGINS=*
      - PORT=3000
    volumes:
      - /path/on/host/to/blender-folder:/blender:ro
      - ./public/models:/workspace/public/models
      - ./param.blend:/workspace/param.blend:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
